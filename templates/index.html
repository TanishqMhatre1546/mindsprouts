{% extends 'base.html' %}
{% block title %}MindSprouts - Login{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-orb orb-1"></div>
    <div class="login-orb orb-2"></div>
    <div class="login-orb orb-3"></div>

    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height:calc(100vh - 60px)">
            <div class="col-lg-5 col-md-7">

                <div class="text-center mb-5 fade-in">
                    <div class="login-logo">
                        <i class="fa-solid fa-seedling"></i>
                    </div>
                    <h1 class="login-title">MindSprouts</h1>
                    <p class="login-subtitle">Learn. Play. Grow! 🚀</p>
                </div>

                <div class="login-card pop-in">
                    <div class="tab-switcher">
                        <button class="tab-btn active" onclick="switchTab('student')">
                            <i class="fa-solid fa-user-graduate"></i> Student
                        </button>
                        <button class="tab-btn" onclick="switchTab('admin')">
                            <i class="fa-solid fa-user-shield"></i> Admin
                        </button>
                    </div>

                    <div id="student-panel">
                        <div class="form-toggle">
                            <button class="toggle-btn active" onclick="switchForm('login')">Login</button>
                            <button class="toggle-btn" onclick="switchForm('signup')">Sign Up</button>
                        </div>

                        <div id="login-form">
                            <form action="{{ url_for('student_login') }}" method="POST">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <div class="input-group-ms">
                                        <i class="fa-solid fa-user"></i>
                                        <input type="text" name="username" class="ms-input"
                                               placeholder="Enter your username" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Password</label>
                                    <div class="input-group-ms">
                                        <i class="fa-solid fa-lock"></i>
                                        <input type="password" name="password" class="ms-input"
                                               placeholder="Enter your password" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn-primary-ms w-100">
                                    <i class="fa-solid fa-rocket"></i> Let's Go!
                                </button>
                            </form>
                        </div>

                        <div id="signup-form" style="display:none">
                            <form action="{{ url_for('signup') }}" method="POST">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <div class="mb-3">
                                    <label class="form-label">Your Name</label>
                                    <div class="input-group-ms">
                                        <i class="fa-solid fa-face-smile"></i>
                                        <input type="text" name="display_name" class="ms-input"
                                               placeholder="What's your name?" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <div class="input-group-ms">
                                        <i class="fa-solid fa-user"></i>
                                        <input type="text" name="username" class="ms-input"
                                               placeholder="Choose a username" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="input-group-ms">
                                        <i class="fa-solid fa-lock"></i>
                                        <input type="password" name="password" class="ms-input"
                                               placeholder="Create a password" minlength="6" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Your Grade</label>
                                    <div class="input-group-ms">
                                        <i class="fa-solid fa-graduation-cap"></i>
                                        <select name="grade" class="ms-input" required>
                                            <option value="">Select your grade</option>
                                            <option value="1">Grade 1</option>
                                            <option value="2">Grade 2</option>
                                            <option value="3">Grade 3</option>
                                            <option value="4">Grade 4</option>
                                            <option value="5">Grade 5</option>
                                        </select>
                                    </div>
                                </div>
                                <button type="submit" class="btn-primary-ms w-100">
                                    <i class="fa-solid fa-star"></i> Create Account!
                                </button>
                            </form>
                        </div>
                    </div>

                    <div id="admin-panel" style="display:none">
                        <form action="{{ url_for('admin_login') }}" method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label class="form-label">Admin Username</label>
                                <div class="input-group-ms">
                                    <i class="fa-solid fa-user-shield"></i>
                                    <input type="text" name="username" class="ms-input"
                                           placeholder="Admin username" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <div class="input-group-ms">
                                    <i class="fa-solid fa-lock"></i>
                                    <input type="password" name="password" class="ms-input"
                                           placeholder="Admin password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary-ms w-100">
                                <i class="fa-solid fa-shield-halved"></i> Admin Login
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
/* ── Hide navbar on login page so there's zero gap ── */
body:has(.login-page) nav.navbar { display: none; }

.login-page {
    background: var(--bg);
    min-height: 100vh;
    /* Pull up to cover the space where navbar would be */
    margin-top: -1px;
    position: relative;
    overflow: hidden;
    background-image:
        radial-gradient(ellipse at 15% 40%, rgba(124,92,252,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(6,199,146,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 65% 85%, rgba(255,107,107,0.05) 0%, transparent 55%);
}
.login-orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
}
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,92,252,0.18), transparent 70%); top: -120px; left: -160px; animation: floatOrb 9s ease-in-out infinite; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(6,199,146,0.14), transparent 70%); bottom: -100px; right: -120px; animation: floatOrb 11s ease-in-out infinite reverse; }
.orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,107,107,0.1), transparent 70%); top: 42%; right: 18%; animation: floatOrb 13s ease-in-out infinite 2s; }
@keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(28px, -18px) scale(1.04); }
    66%       { transform: translate(-18px, 28px) scale(0.97); }
}
.login-page .container { position: relative; z-index: 1; }
.login-logo {
    width: 88px; height: 88px;
    background: linear-gradient(135deg, var(--violet), var(--violet-light));
    border-radius: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem; color: white;
    margin: 0 auto 18px;
    box-shadow: 0 8px 36px var(--violet-glow), 0 4px 16px rgba(0,0,0,0.08);
    animation: logoBounce 3.5s ease-in-out infinite;
}
@keyframes logoBounce {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%       { transform: translateY(-9px) rotate(2deg); }
}
.login-title {
    color: var(--text-main);
    font-family: 'Fredoka One', sans-serif;
    font-size: 2.8rem;
    margin-bottom: 4px;
}
.login-subtitle { color: var(--text-muted); font-size: 1.1rem; font-weight: 700; }
.login-card {
    background: rgba(255,255,255,0.85);
    border: 1.5px solid var(--border-strong);
    border-radius: var(--r-xl);
    padding: 34px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
}
.tab-switcher {
    display: flex; gap: 8px;
    background: var(--bg-surface);
    border-radius: var(--r-md); padding: 6px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
}
.tab-btn {
    flex: 1; border: none; background: transparent;
    border-radius: var(--r-sm); padding: 10px;
    font-family: 'Fredoka One', sans-serif; font-size: 0.97rem;
    color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.tab-btn.active {
    background: white; color: var(--violet);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-strong);
}
.form-toggle {
    display: flex; gap: 0;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--r-md); overflow: hidden;
    margin-bottom: 24px;
}
.toggle-btn {
    flex: 1; border: none; background: transparent;
    padding: 10px; font-family: 'Fredoka One', sans-serif;
    font-size: 0.97rem; color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.toggle-btn.active { background: linear-gradient(135deg, var(--violet), var(--violet-light)); color: white; }
.input-group-ms {
    display: flex; align-items: center;
    background: var(--bg-surface);
    border: 1.5px solid var(--border-strong);
    border-radius: var(--r-md); padding: 0 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.input-group-ms:focus-within { border-color: var(--violet); box-shadow: 0 0 0 3px var(--violet-glow); background: white; }
.input-group-ms i { color: var(--text-dim); margin-right: 10px; font-size: 0.9rem; }
.ms-input {
    flex: 1; border: none; background: transparent;
    padding: 12px 0; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; outline: none; color: var(--text-main);
}
.ms-input::placeholder { color: var(--text-dim); }
.login-card .form-label { color: var(--text-muted) !important; font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; }
@media (max-width: 576px) {
    .login-card { padding: 24px 18px; margin: 0 8px; }
    .login-title { font-size: 2.2rem; }
    .login-logo { width: 72px; height: 72px; font-size: 2rem; }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
function switchTab(tab) {
    document.getElementById('student-panel').style.display = tab === 'student' ? 'block' : 'none';
    document.getElementById('admin-panel').style.display   = tab === 'admin'   ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'student') || (i === 1 && tab === 'admin'));
    });
}
function switchForm(form) {
    document.getElementById('login-form').style.display  = form === 'login'  ? 'block' : 'none';
    document.getElementById('signup-form').style.display = form === 'signup' ? 'block' : 'none';
    document.querySelectorAll('.toggle-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && form === 'login') || (i === 1 && form === 'signup'));
    });
}
</script>
{% endblock %}
